name: Build Standalone Executables

on:
  push:
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: fosstree-linux
          - os: windows-latest
            artifact: fosstree-windows
          - os: macos-latest
            artifact: fosstree-macos

    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Build with PyInstaller
        run: pyinstaller fosstree.spec

      - name: Test executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ./dist/fosstree/fosstree info strategy1.tree

      - name: Test executable (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\fosstree\fosstree.exe info strategy1.tree

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/fosstree/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package artifacts
        run: |
          cd fosstree-linux && tar czf ../fosstree-linux.tar.gz . && cd ..
          cd fosstree-macos && tar czf ../fosstree-macos.tar.gz . && cd ..
          cd fosstree-windows && zip -r ../fosstree-windows.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fosstree-linux.tar.gz
            fosstree-macos.tar.gz
            fosstree-windows.zip
          generate_release_notes: true
